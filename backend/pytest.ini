[pytest]
pythonpath = .
testpaths = tests
markers =
    qrt: automated quality requirement test (Assignment 4)
addopts = -q
    --cov=app.api.recommend
    --cov=app.api.auth
    --cov=app.api.account
    --cov=app.api.account_security
    --cov=app.api.tracker
    --cov=app.core.security
    --cov=app.core.tracker
    --cov-report=term-missing --cov-fail-under=30
