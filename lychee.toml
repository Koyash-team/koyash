# Configuration for lychee (https://lychee.cli.rs), the link checker used by
# .github/workflows/lychee.yml.
#
# Run locally:
#   lychee --config lychee.toml './**/*.md'
# Or via Docker (no local install needed):
#   docker run --rm -v "$PWD:/input" -w /input lycheeverse/lychee \
#     --config lychee.toml './**/*.md'

# Skip links that point at localhost / 127.0.0.1 / 0.0.0.0. These are local
# development URLs and are never reachable from a CI runner.
# Affects:
#   - README.md ("Running locally" -> http://localhost:8000/health, /docs)
#   - reports/week2/mvp-v0-report.md (smoke-check -> http://localhost:8000/docs)
exclude_loopback = true

exclude = [
  # YouTube blocks automated HTTP clients (incl. lychee and GitHub-hosted
  # runners) during the TLS handshake / via bot detection, so requests never
  # get a real response. Pattern matches any youtu.be link, not a single
  # hard-coded URL, since the repo links both the current and historical demo.
  # Affects: README.md "Deployment" section (current MVP v1 demo,
  # https://youtu.be/SDuBlborKr0, verified 2026-06-21),
  # reports/week3/README.md (same link), and
  # reports/week2/mvp-v0-report.md "Public video demonstration link"
  # (historical MVP v0 demo, https://youtu.be/ftTVnoXQvI8, verified 2026-06-13).
  '^https://youtu\.be/',

  # The Innopolis University GitLab instance sits behind university SSO and
  # times out from GitHub-hosted CI runners (no credentials, no network path
  # to the login flow). Pattern matches the platform root only.
  # Affects: docs/Repository_Requirements.md (baseline repo-platform options:
  # IU GitLab / GitLab.com / GitHub). Manually verified 2026-06-27: resolves
  # to a real Innopolis University SSO login page in a browser, not a dead
  # domain.
  '^https://gitlab\.pg\.innopolis\.university',
]

# Be lenient with slow or flaky external hosts (e.g. the Railway deployment,
# which can take a moment to wake up) before reporting a failure.
max_retries = 3
retry_wait_time = 5
timeout = 20
