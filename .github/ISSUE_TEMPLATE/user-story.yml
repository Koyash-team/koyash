name: User Story
description: Describe a user story
title: "US-XXX: "
labels: ["user-story"]
body:
  - type: input
    id: stable-id
    attributes:
      label: Stable User-Story ID
      placeholder: e.g. US-001
    validations:
      required: true
  - type: textarea
    id: story
    attributes:
      label: User Story Statement
      description: "As a [persona], I want [action], so that [value]."
    validations:
      required: true
  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW Priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes and Constraints
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria. Use Given/When/Then if applicable.