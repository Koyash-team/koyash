name: User Story
description: Describe a user story
title: "US-XXX: "
labels: ["user-story"]
body:
  - type: input
    id: stable-id
    attributes:
      label: Stable User-Story ID
      placeholder: e.g. US-001
    validations:
      required: true
  - type: textarea
    id: story
    attributes:
      label: User Story Statement
      description: "As a [persona], I want [action], so that [value]."
    validations:
      required: true
  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW Priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have
    validations:
      required: true
  - type: input
    id: implementer
    attributes:
      label: Implementer(s)
      description: GitHub @handle(s) who own delivery of this story. Also set the issue Assignee to match.
      placeholder: "@handle"
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      description: A different team member's @handle who will review the delivering PR(s). Must differ from the implementer.
      placeholder: "@handle"
  - type: textarea
    id: notes
    attributes:
      label: Notes and Constraints
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria. Use Given/When/Then if applicable.
  - type: textarea
    id: evidence
    attributes:
      label: Verification evidence
      description: Once delivered, link the supporting PBIs/PRs, CI runs, tests or screenshots that show the acceptance criteria are met.