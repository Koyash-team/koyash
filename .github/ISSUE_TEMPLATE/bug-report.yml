name: Bug Report
description: Report a defect
title: Bug Report
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria for the Fix
